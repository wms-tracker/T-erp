<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ฝ่ายขาย — Web ERP</title>
<link rel="stylesheet" href="css/erp.css" />
</head>
<body></body>
<script type="module">
import { requireRole, db } from "./js/auth.js";
import { renderShell, statusBadge } from "./js/shell.js";
import {
  collection, query, where, limit,
  getDocs, addDoc, doc, getDoc, updateDoc,
  serverTimestamp, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const profile = await requireRole(['sales']);
const main = renderShell(profile, 'orders', '📋 ออเดอร์ของฉัน');

// ============================================================
// SHELL
// ============================================================
main.innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">

      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <input id="search-order" type="text" placeholder="🔍 ค้นหา Order ID / ลูกค้า..."

          <th style="text-align:right;">ยอดรวม</th><th>กำหนดส่ง</th><th>สถานะ</th><th>สถานะคลัง</th>

`;

// search filter
let _allOrders = [];
document.getElementById('search-order').addEventListener('input', function () {
  const q = this.value.toLowerCase();
  const filtered = _allOrders.filter(o =>
    (o.id || '').toLowerCase().includes(q) ||
    (o.customer?.name || '').toLowerCase().includes(q) ||
    (o.channel || '').toLowerCase().includes(q)
  );
  renderTable(filtered);
});

await loadOrders();

// ============================================================
// LOAD ORDERS
// ============================================================
async function loadOrders() {
  const tbody = document.getElementById('order-rows');
  try {
    const q = query(
      collection(db, 'orders'),
      where('createdBy', '==', profile.uid),
      limit(200)
    );
    const snap = await getDocs(q);
    _allOrders = [];
    snap.forEach(d => _allOrders.push({ _id: d.id, ...d.data() }));
    // sort client-side — ไม่ต้องสร้าง Firestore composite index
    _allOrders.sort((a, b) => (b.createdAt?.seconds ?? 0) - (a.createdAt?.seconds ?? 0));
    renderTable(_allOrders);
    setStats(_allOrders);
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#d23;">
      โหลดไม่สำเร็จ: ${err.message}
    </td></tr>`;
  }
}

function renderTable(orders) {
  const tbody = document.getElementById('order-rows');
  if (!orders.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#999;">ยังไม่มีออเดอร์</td></tr>`;
    return;
  }
  const wsBadge = s => {
    if (!s) return '<span style="color:#bbb;font-size:0.78rem;">—</span>';
    const map = {
      'รอหยิบสินค้า': '#fef3c7',  'กำลังหยิบ': '#fef3c7',
      'รอตรวจสอบ QC': '#dbeafe',  'พร้อมจัดส่ง': '#d1fae5',
      'จัดส่งแล้ว': '#e0e7ff',
    };
    return `<span style="background:${map[s]||'#f0f0f0'};padding:2px 8px;border-radius:12px;font-size:0.76rem;">${s}</span>`;
  };
  tbody.innerHTML = orders.map(o => `
    <tr style="cursor:pointer;" onclick="window.__viewOrder('${o._id}')">
      <td><b style="font-family:monospace;">${o.id || o._id}</b></td>
      <td>${o.orderDate || '–'}</td>
      <td>${o.customer?.name || '–'}</td>
      <td style="font-size:0.82rem;">${o.channel || '–'}</td>
      <td style="text-align:right;">${fmt(o.grandTotal ?? o.subtotal)}</td>
      <td>${o.shipping?.shipDate || '–'}</td>
      <td>${statusBadge(o.status || 'รอดำเนินการ')}</td>
      <td>${wsBadge(o.warehouseStage)}</td>
    </tr>
  `).join('');
}

function setStats(orders) {
  document.getElementById('stat-total').textContent    = orders.length;
  document.getElementById('stat-pending').textContent  = orders.filter(o => o.status === 'รอดำเนินการ').length;
  document.getElementById('stat-shipping').textContent = orders.filter(o => ['กำลังแพ็ค','จัดส่งแล้ว'].includes(o.status)).length;
  document.getElementById('stat-done').textContent     = orders.filter(o => o.status === 'เสร็จสิ้น').length;
}

window.__cancelOrder = async function (docId) {
  if (!confirm('ยืนยันยกเลิกออเดอร์นี้?')) return;
  await updateDoc(doc(db, 'orders', docId), { status: 'ยกเลิก', updatedAt: serverTimestamp() });
  document.getElementById('order-detail-overlay')?.remove();
  toast('ยกเลิกออเดอร์แล้ว');
  await loadOrders();
};

// ============================================================
// SKU SEARCH DROPDOWN
// ============================================================
function _setupSkuSearch() {
  const inp = document.getElementById('no-sku');
  const dd  = document.getElementById('no-sku-dropdown');
  let _selected = null;

  inp.addEventListener('input', function () {
    _selected = null;
    const q = this.value.toLowerCase().trim();
    if (!q) { dd.style.display = 'none'; return; }
    const matches = _products.filter(p =>
      (p.id || '').toLowerCase().includes(q) ||
      (p.name || p.productName || '').toLowerCase().includes(q)
    ).slice(0, 12);
    if (!matches.length) { dd.style.display = 'none'; return; }
    dd.style.display = 'block';
    dd.innerHTML = matches.map(p => {
      const stock = (p.stockQty || 0) - (p.reservedQty || 0);
      const stockColor = stock <= 0 ? '#d23' : stock < 5 ? '#f59e0b' : '#1a8a3a';
      return `<div data-sku="${p.id}" style="padding:9px 12px;cursor:pointer;font-size:0.86rem;display:flex;justify-content:space-between;align-items:center;gap:8px;"
          onmouseover="this.style.background='#f0f3ff'" onmouseout="this.style.background=''"
          onclick="window.__selectSku('${p.id}','${(p.name || p.productName || p.id).replace(/'/g,"\\'")}',${p.salePrice || p.price || 0},${stock})">
        <span><b style="font-family:monospace;">${p.id}</b> — ${p.name || p.productName || ''}</span>
        <span style="color:${stockColor};font-size:0.78rem;white-space:nowrap;">สต๊อก ${stock}</span>
      </div>`;
    }).join('');
  });

  document.addEventListener('click', function (ev) {
    if (!dd.contains(ev.target) && ev.target !== inp) dd.style.display = 'none';
  }, { capture: true });

  window.__selectSku = function (sku, name, price, stock) {
    inp.value = `${sku} — ${name}`;
    inp.dataset.sku  = sku;
    inp.dataset.name = name;
    inp.dataset.stock = stock;
    dd.style.display = 'none';
    const priceInp = document.getElementById('no-price');
    if (!priceInp.value) priceInp.value = price || '';
    document.getElementById('no-qty').focus();
  };

  inp.addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter') { ev.preventDefault(); window.__addItem(); }
  });
}

// ============================================================
// ITEM MANAGEMENT
// ============================================================
window.__addItem = function () {
  const skuInp   = document.getElementById('no-sku');
  const qtyInp   = document.getElementById('no-qty');
  const priceInp = document.getElementById('no-price');
  const err      = document.getElementById('no-err');

  const sku   = (skuInp.dataset.sku || skuInp.value.trim()).split(' ')[0];
  const name  = skuInp.dataset.name || sku;
  const qty   = parseInt(qtyInp.value) || 0;
  const price = parseFloat(priceInp.value) || 0;
  const stock = parseInt(skuInp.dataset.stock ?? 9999);

  if (!sku)   { err.textContent = '⚠️ กรุณาเลือกสินค้าก่อน'; return; }
  if (qty < 1){ err.textContent = '⚠️ จำนวนต้องมากกว่า 0'; return; }
  if (price < 0){ err.textContent = '⚠️ ราคาไม่ถูกต้อง'; return; }
  if (stock < qty){ err.textContent = `⚠️ สต๊อก ${sku} เหลือ ${stock} ชิ้น (ต้องการ ${qty})`; return; }
  err.textContent = '';

  // ถ้า SKU ซ้ำ → เพิ่มจำนวน
  const existing = _orderItems.find(it => it.sku === sku);
  if (existing) {
    existing.qty   += qty;
    existing.price  = price; // อัปเดตราคาล่าสุด
  } else {
    _orderItems.push({ sku, name, qty, price, stock });
  }

  // reset
  skuInp.value = ''; skuInp.dataset.sku = ''; skuInp.dataset.name = ''; skuInp.dataset.stock = '';
  qtyInp.value = '1'; priceInp.value = '';
  _renderItemList();
  skuInp.focus();
};

window.__removeItem = function (idx) {
  _orderItems.splice(idx, 1);
  _renderItemList();
};

window.__itemQtyChange = function (idx, val) {
  _orderItems[idx].qty = Math.max(1, parseInt(val) || 1);
  _renderItemList();
};

window.__itemPriceChange = function (idx, val) {
  _orderItems[idx].price = Math.max(0, parseFloat(val) || 0);
  _renderItemList();
};

function _renderItemList() {
  const box = document.getElementById('no-item-list');
  if (!_orderItems.length) {
    box.innerHTML = `<p style="color:#bbb;font-size:0.84rem;text-align:center;margin:4px 0;">ยังไม่มีรายการสินค้า</p>`;
    __recalc(); return;
  }
  box.innerHTML = `
    <table>
      <thead><tr>
        <th>SKU</th><th>ชื่อสินค้า</th>
        <th style="text-align:center;">จำนวน</th>
        <th style="text-align:right;">ราคา/ชิ้น</th>
        <th style="text-align:right;">รวม</th>
        <th></th>
      </tr></thead>
      <tbody>
        ${_orderItems.map((it, i) => `
          <tr>
            <td class="mono" style="font-size:0.82rem;">${it.sku}</td>
            <td style="font-size:0.85rem;">${it.name}</td>
            <td style="text-align:center;">
              <input type="number" min="1" max="${it.stock}" value="${it.qty}"
                style="width:60px;padding:4px 6px;border:1.5px solid #c5c8d6;border-radius:6px;text-align:center;font-family:inherit;"
                oninput="window.__itemQtyChange(${i},this.value)" />
            </td>
            <td style="text-align:right;">
              <input type="number" min="0" value="${it.price}"
                style="width:90px;padding:4px 6px;border:1.5px solid #c5c8d6;border-radius:6px;text-align:right;font-family:inherit;"
                oninput="window.__itemPriceChange(${i},this.value)" />
            </td>
            <td style="text-align:right;font-weight:600;">${fmt(it.price * it.qty)}</td>
            <td style="text-align:center;">
              <button onclick="window.__removeItem(${i})"
                style="border:none;background:none;color:#d23;cursor:pointer;font-size:1rem;padding:2px 6px;">✕</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  __recalc();
}

window.__recalc = function () {
  const subtotal  = _orderItems.reduce((s, it) => s + it.price * it.qty, 0);
  const shipfee   = parseFloat(document.getElementById('no-shipfee')?.value) || 0;
  const grand     = subtotal + shipfee;
  const el = id => document.getElementById(id);
  if (el('no-subtotal'))       el('no-subtotal').textContent       = `฿${subtotal.toLocaleString('th-TH',{minimumFractionDigits:2})}`;
  if (el('no-shipfee-display'))el('no-shipfee-display').textContent= `฿${shipfee.toLocaleString('th-TH',{minimumFractionDigits:2})}`;
  if (el('no-grand'))          el('no-grand').textContent          = `฿${grand.toLocaleString('th-TH',{minimumFractionDigits:2})}`;
};
// alias
function __recalc() { window.__recalc(); }

// ============================================================
// SAVE ORDER
// ============================================================
window.__saveOrder = async function () {
  const err = document.getElementById('no-err');
  const cname = document.getElementById('no-cname').value.trim();
  if (!cname) { err.textContent = '⚠️ กรุณากรอกชื่อลูกค้า'; return; }
  if (!_orderItems.length) { err.textContent = '⚠️ กรุณาเพิ่มรายการสินค้าอย่างน้อย 1 รายการ'; return; }
  err.textContent = '';

  const subtotal  = _orderItems.reduce((s, it) => s + it.price * it.qty, 0);
  const shipfee   = parseFloat(document.getElementById('no-shipfee').value) || 0;
  const grandTotal = subtotal + shipfee;

  // Auto-generate Order ID: SO-YYYYMMDD-XXXX
  const d     = new Date();
  const pad   = n => String(n).padStart(2,'0');
  const dateStr = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
  const rand  = Math.random().toString(36).slice(2,6).toUpperCase();
  const orderId = `SO-${dateStr}-${rand}`;

  const orderData = {
    id:           orderId,
    orderDate:    document.getElementById('no-date').value,
    channel:      document.getElementById('no-channel').value,
    customer: {
      name:    cname,
      phone:   document.getElementById('no-cphone').value.trim(),
      address: document.getElementById('no-caddr').value.trim(),
    },
    shipping: {
      carrier:  document.getElementById('no-carrier').value,
      shipDate: document.getElementById('no-shipdate').value,
    },
    shippingFee: shipfee,
    note:        document.getElementById('no-note').value.trim(),
    items:       _orderItems.map(it => ({
      sku: it.sku, name: it.name,
      qty: it.qty, price: it.price,
      lineTotal: it.price * it.qty,
    })),
    subtotal,
    grandTotal,
    status:      'รอดำเนินการ',
    createdBy:   profile.uid,
    createdByName: profile.name || profile.email,
    salesperson: profile.name || profile.email,
    createdAt:   serverTimestamp(),
    updatedAt:   serverTimestamp(),
  };

  // reserve stock
  try {
    for (const it of _orderItems) {
      const pRef = doc(db, 'products', it.sku);
      await runTransaction(db, async (tx) => {
        const pSnap = await tx.get(pRef);
        if (!pSnap.exists()) return;
        const p = pSnap.data();
        tx.update(pRef, {
          reservedQty: (p.reservedQty || 0) + it.qty,
        });
      });
    }
  } catch (e) { console.warn('จองสต๊อกไม่สำเร็จ (ข้ามได้)', e); }

  const saveBtn = document.querySelector('#new-order-overlay .btn-success');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'กำลังบันทึก...'; }

  try {
    await addDoc(collection(db, 'orders'), orderData);
    window.__closeNewOrder();
    toast(`✅ บันทึกออเดอร์ ${orderId} สำเร็จ`);
    await loadOrders();
  } catch (e) {
    err.textContent = 'บันทึกไม่สำเร็จ: ' + e.message;
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 บันทึกออเดอร์'; }
  }
};

// ============================================================
// UTILS
// ============================================================
function fmt(n) {
  return '฿' + (parseFloat(n) || 0).toLocaleString('th-TH', { minimumFractionDigits: 2 });
}

function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1a8a3a;color:#fff;padding:11px 18px;border-radius:10px;font-size:0.9rem;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.18);';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}
</script>
</html>
