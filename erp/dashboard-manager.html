<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ผู้บริหาร — Web ERP</title>
<link rel="stylesheet" href="css/erp.css" />
</head>
<body></body>
<script type="module">
  import { requireRole } from "./js/auth.js";
  import { renderShell } from "./js/shell.js";

  const profile = await requireRole(['manager']);

  const SECTIONS = {
    overview: { title: '📊 ภาพรวมทุกแผนก',            desc: 'สรุปยอดขาย สถานะคลัง และสถานะการเงินแบบภาพรวมข้ามแผนก สำหรับผู้บริหาร', phase: 'เฟส 4' },
    orders:   { title: '📋 ออเดอร์ทั้งหมด (ดูอย่างเดียว)', desc: 'ดูออเดอร์ทุกรายการในระบบแบบ read-only เพื่อติดตามภาพรวมการขาย', phase: 'เฟส 4' },
    finance:  { title: '💰 รายงานการเงิน (ดูอย่างเดียว)', desc: 'ดูสรุปยอดขาย ต้นทุน กำไร และกระแสเงินสดแบบ read-only', phase: 'เฟส 4' },
  };

  const key = (location.hash || '#overview').replace('#', '');
  const main = renderShell(profile, key, (SECTIONS[key] || SECTIONS.overview).title);
  renderSection(key);
  window.addEventListener('hashchange', () => location.reload());

  function renderSection(k) {
    const s = SECTIONS[k] || SECTIONS.overview;
    main.innerHTML = `
      <div class="card">
        <p>${s.desc}</p>
        <div style="background:#fff8e8;border:1px solid #ffe6a8;border-radius:10px;padding:14px 18px;font-size:0.88rem;color:#8a6400;">
          🚧 โมดูลนี้จะถูกพัฒนาใน <b>${s.phase}</b> หลังจากโมดูลคลังสินค้าและบัญชีพร้อมใช้งาน
          (เพราะรายงานภาพรวมต้องดึงข้อมูลจากทุกโมดูลมารวมกัน)
        </div>
      </div>
    `;
  }
</script>
</html>
