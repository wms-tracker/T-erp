<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>แอดมิน — Web ERP</title>
<link rel="stylesheet" href="css/erp.css" />
</head>
<body></body>
<script type="module">
  import { requireRole, db } from "./js/auth.js";
  import { renderShell } from "./js/shell.js";
  import {
    collection, getDocs, addDoc, doc, setDoc, updateDoc, query, orderBy, limit, runTransaction, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const profile = await requireRole(['admin']);

  const SECTIONS = {
    orders:    { title: '📋 ออเดอร์ทั้งหมด',          desc: 'ดูและติดตามสถานะออเดอร์ของทุกฝ่ายขาย ประสานงานกับคลังสินค้า', phase: 'เฟส 1 — ใช้งานได้แล้วด้านล่าง 👇' },
    documents: { title: '📑 เอกสารขาย/ขนส่ง',         desc: 'จัดทำและจัดเก็บเอกสารประกอบการขายและการขนส่ง (ใบส่งของ/ใบกำกับสินค้า, ใบปะหน้าพัสดุ, ใบสรุปแพ็คสินค้า) พร้อมพิมพ์และบันทึกประวัติ', phase: 'เฟส 2 — ใช้งานได้แล้ว 👇' },
    routing:   { title: '🗺 จัดรูทขนส่ง / คัตออฟ',      desc: 'จัดกลุ่มออเดอร์ที่รอจัดส่งตามผู้ขนส่ง/เส้นทาง กำหนดเวลาคัตออฟประจำวัน และปิดรอบเพื่อส่งสรุปยอดให้ฝ่ายที่เกี่ยวข้อง', phase: 'เฟส 2 — ใช้งานได้แล้ว 👇' },
    users:     { title: '👥 จัดการผู้ใช้งาน & สิทธิ์', desc: 'เพิ่ม/ลบ/แก้ไขบัญชีผู้ใช้งาน กำหนดแผนกและสิทธิ์การเข้าถึง (RBAC)', phase: 'เฟส 1 — ใช้งานได้แล้วด้านล่าง 👇' },
    reports:   { title: '📊 รายงานประจำวัน',          desc: 'สรุปยอดขาย สถานะคลัง และภาพรวมการดำเนินงานประจำวันของทุกแผนก', phase: 'เฟส 4' },
  };

  const key = (location.hash || '#users').replace('#', '');
  const main = renderShell(profile, key, (SECTIONS[key] || SECTIONS.users).title);

  if (key === 'users') renderUserManagement();
  else if (key === 'orders') renderAllOrders();
  else if (key === 'documents') renderDocuments();
  else if (key === 'routing') renderRouting();
  else if (key === 'reports') renderDailyReport();
  else renderPlaceholder(key);

  window.addEventListener('hashchange', () => location.reload());

  function renderPlaceholder(k) {
    const s = SECTIONS[k] || SECTIONS.users;
    main.innerHTML = `
      <div class="card">
        <p>${s.desc}</p>
        <div style="background:#fff8e8;border:1px solid #ffe6a8;border-radius:10px;padding:14px 18px;font-size:0.88rem;color:#8a6400;">
          🚧 โมดูลนี้จะถูกพัฒนาใน <b>${s.phase}</b>
        </div>
      </div>
    `;
  }

  // =========================================================
  // 📑 เอกสารขาย/ขนส่ง (เฟส 2)
  // =========================================================
  function escDoc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmtMoneyDoc(n) { return Number(n || 0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtDateDoc(d) {
    if (!d) return '-';
    try { return new Date(d).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }); }
    catch { return d; }
  }

  const DOC_TYPES = {
    delivery: { label: '🚚 ใบส่งของ / ใบกำกับสินค้า', code: 'DN' },
    packing:  { label: '📦 ใบสรุปแพ็คสินค้า',          code: 'PK' },
    shipping: { label: '🏷 ใบปะหน้าพัสดุ',             code: 'SH' },
  };

  let _docOrdersCache = [];
  let _docLogCache = [];

  async function renderDocuments() {
    main.innerHTML = `
      <div class="card">
        <p>${SECTIONS.documents.desc}</p>
      </div>
      <div class="card">
        <h3 style="margin-top:0;">🔍 ค้นหาออเดอร์เพื่อจัดทำเอกสาร</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;">
          <input type="text" id="doc-search" placeholder="ค้นหาด้วยเลขออเดอร์ หรือชื่อลูกค้า..." style="flex:1;min-width:220px;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:0.9rem;" />
          <button class="btn btn-outline" id="btn-doc-refresh">🔄 รีเฟรช</button>
        </div>
        <div id="doc-orders-box">⏳ กำลังโหลด...</div>
      </div>
      <div class="card">
        <h3 style="margin-top:0;">🗂 ประวัติเอกสารที่จัดทำแล้ว</h3>
        <div id="doc-log-box">⏳ กำลังโหลด...</div>
      </div>
    `;
    document.getElementById('btn-doc-refresh').addEventListener('click', loadDocOrdersAndLog);
    document.getElementById('doc-search').addEventListener('input', renderDocOrderRows);
    await loadDocOrdersAndLog();
  }

  async function loadDocOrdersAndLog() {
    const box = document.getElementById('doc-orders-box');
    const logBox = document.getElementById('doc-log-box');
    if (box) box.innerHTML = '⏳ กำลังโหลด...';
    if (logBox) logBox.innerHTML = '⏳ กำลังโหลด...';
    try {
      const ordersSnap = await getDocs(query(collection(db, 'orders'), orderBy('createdAtServer', 'desc'), limit(200)));
      _docOrdersCache = ordersSnap.docs.map(d => ({ _id: d.id, ...d.data() }));
    } catch (e) { _docOrdersCache = []; console.warn(e); }
    try {
      const logSnap = await getDocs(query(collection(db, 'salesDocuments'), orderBy('generatedAtServer', 'desc'), limit(100)));
      _docLogCache = logSnap.docs.map(d => ({ _id: d.id, ...d.data() }));
    } catch (e) { _docLogCache = []; console.warn(e); }
    renderDocOrderRows();
    renderDocLog();
  }

  function renderDocOrderRows() {
    const box = document.getElementById('doc-orders-box');
    if (!box) return;
    const term = (document.getElementById('doc-search')?.value || '').trim().toLowerCase();
    let list = _docOrdersCache;
    if (term) {
      list = list.filter(o =>
        (o.id || '').toLowerCase().includes(term) ||
        (o.customer?.name || '').toLowerCase().includes(term) ||
        (o.customer?.phone || '').includes(term)
      );
    }
    list = list.slice(0, 60);
    if (!list.length) {
      box.innerHTML = `<p style="color:#888;font-size:0.88rem;">— ไม่พบออเดอร์ที่ตรงกับคำค้นหา —</p>`;
      return;
    }
    box.innerHTML = `
      <table>
        <thead><tr><th>เลขออเดอร์</th><th>ลูกค้า</th><th>ช่องทาง/ขนส่ง</th><th>ยอดรวม</th><th>สถานะคลัง</th><th>จัดทำเอกสาร</th></tr></thead>
        <tbody>
          ${list.map(o => `
            <tr>
              <td>${escDoc(o.id)}</td>
              <td>${escDoc(o.customer?.name || '-')}</td>
              <td>${escDoc(o.shipping?.deliveryBy || o.channel || '-')}</td>
              <td>${fmtMoneyDoc(o.subtotal)}</td>
              <td>${escDoc(o.warehouseStage || '-')}</td>
              <td>
                <select data-order="${o._id}" class="doc-type-pick" style="padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:0.8rem;">
                  ${Object.entries(DOC_TYPES).map(([k, v]) => `<option value="${k}">${v.label}</option>`).join('')}
                </select>
                <button class="btn btn-primary" style="padding:6px 12px;font-size:0.78rem;" onclick="window.__genDoc('${o._id}', this)">🖨 สร้าง/พิมพ์</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function renderDocLog() {
    const box = document.getElementById('doc-log-box');
    if (!box) return;
    if (!_docLogCache.length) {
      box.innerHTML = `<p style="color:#888;font-size:0.88rem;">— ยังไม่มีประวัติการจัดทำเอกสาร —</p>`;
      return;
    }
    box.innerHTML = `
      <table>
        <thead><tr><th>เลขที่เอกสาร</th><th>ประเภท</th><th>เลขออเดอร์</th><th>ลูกค้า</th><th>วันที่จัดทำ</th><th>โดย</th><th></th></tr></thead>
        <tbody>
          ${_docLogCache.map(d => `
            <tr>
              <td>${escDoc(d.docNo)}</td>
              <td>${escDoc((DOC_TYPES[d.docType] || {}).label || d.docType)}</td>
              <td>${escDoc(d.orderId)}</td>
              <td>${escDoc(d.customerName || '-')}</td>
              <td>${fmtDateDoc(d.generatedAt)}</td>
              <td>${escDoc(d.generatedByName || '-')}</td>
              <td><button class="btn btn-outline" style="padding:5px 12px;font-size:0.76rem;" onclick="window.__reprintDoc('${d._id}')">🖨 พิมพ์ซ้ำ</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  async function nextDocNo(counterId, prefix) {
    const ref = doc(db, 'counters', counterId);
    const next = await runTransaction(db, async (tx) => {
      const snap = await tx.get(ref);
      const cur = snap.exists() ? (snap.data().value || 0) : 0;
      const updated = cur + 1;
      tx.set(ref, { value: updated }, { merge: true });
      return updated;
    });
    return prefix + String(next).padStart(6, '0');
  }

  function buildDocHtml(docType, docNo, order) {
    const typeLabel = (DOC_TYPES[docType] || {}).label || docType;
    const c = order.customer || {};
    const addr = [c.addressDetail, c.district, c.province, c.zipcode].filter(Boolean).join(' ');
    const itemsRows = (order.items || []).map((it, idx) => `
      <tr>
        <td style="text-align:center;">${idx + 1}</td>
        <td>${escDoc(it.name || it.model || it.sku || '-')}</td>
        <td style="text-align:center;">${escDoc(it.qty ?? '-')}</td>
        <td style="text-align:right;">${it.price != null ? fmtMoneyDoc(it.price) : '-'}</td>
        <td style="text-align:right;">${(it.price != null && it.qty != null) ? fmtMoneyDoc(Number(it.price) * Number(it.qty)) : '-'}</td>
      </tr>
    `).join('');

    let bodyExtra = '';
    if (docType === 'delivery') {
      bodyExtra = `
        <table style="width:100%;border-collapse:collapse;margin-top:14px;font-size:13px;">
          <thead><tr style="background:#f4f6fa;">
            <th style="border:1px solid #ddd;padding:6px;">#</th>
            <th style="border:1px solid #ddd;padding:6px;text-align:left;">รายการสินค้า</th>
            <th style="border:1px solid #ddd;padding:6px;">จำนวน</th>
            <th style="border:1px solid #ddd;padding:6px;">ราคา/หน่วย</th>
            <th style="border:1px solid #ddd;padding:6px;">รวม</th>
          </tr></thead>
          <tbody>${itemsRows}</tbody>
        </table>
        <p style="text-align:right;margin-top:10px;font-size:14px;"><b>ยอดรวมทั้งสิ้น: ${fmtMoneyDoc(order.subtotal)} บาท</b></p>
      `;
    } else if (docType === 'packing') {
      bodyExtra = `
        <table style="width:100%;border-collapse:collapse;margin-top:14px;font-size:13px;">
          <thead><tr style="background:#f4f6fa;">
            <th style="border:1px solid #ddd;padding:6px;">#</th>
            <th style="border:1px solid #ddd;padding:6px;text-align:left;">รายการสินค้า</th>
            <th style="border:1px solid #ddd;padding:6px;">จำนวนที่ต้องแพ็ค</th>
            <th style="border:1px solid #ddd;padding:6px;">☑ แพ็คแล้ว</th>
          </tr></thead>
          <tbody>
            ${(order.items || []).map((it, idx) => `
              <tr>
                <td style="text-align:center;border:1px solid #ddd;padding:6px;">${idx + 1}</td>
                <td style="border:1px solid #ddd;padding:6px;">${escDoc(it.name || it.model || it.sku || '-')}</td>
                <td style="text-align:center;border:1px solid #ddd;padding:6px;">${escDoc(it.qty ?? '-')}</td>
                <td style="text-align:center;border:1px solid #ddd;padding:6px;">☐</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <p style="margin-top:16px;font-size:13px;">ผู้แพ็ค: ____________________&nbsp;&nbsp;&nbsp; ผู้ตรวจสอบ (QC): ____________________&nbsp;&nbsp;&nbsp; วันที่: ____________________</p>
      `;
    } else if (docType === 'shipping') {
      bodyExtra = `
        <div style="border:2px dashed #888;border-radius:10px;padding:18px;margin-top:16px;">
          <p style="font-size:12px;color:#888;margin:0 0 4px;">ผู้ส่ง</p>
          <p style="font-size:14px;margin:0 0 14px;"><b>คลังสินค้า / ผู้ขาย</b></p>
          <p style="font-size:12px;color:#888;margin:0 0 4px;">ผู้รับ</p>
          <p style="font-size:18px;margin:0 0 6px;"><b>${escDoc(c.name || '-')}</b></p>
          <p style="font-size:14px;margin:0 0 4px;">โทร: ${escDoc(c.phone || '-')} ${c.phone2 ? '/ ' + escDoc(c.phone2) : ''}</p>
          <p style="font-size:14px;margin:0;">${escDoc(addr || '-')}</p>
        </div>
        <p style="margin-top:14px;font-size:13px;">ขนส่งโดย: ${escDoc(order.shipping?.deliveryBy || '-')} &nbsp;&nbsp;&nbsp; วันที่จัดส่ง: ${fmtDateDoc(order.shipping?.shipDate)}</p>
        <p style="font-size:13px;">หมายเหตุ COD: ${escDoc(order.shipping?.codNotes || '-')}</p>
      `;
    }

    return `
      <!DOCTYPE html><html lang="th"><head><meta charset="UTF-8" />
      <title>${escDoc(docNo)} — ${escDoc(typeLabel)}</title>
      <style>
        body { font-family: 'Segoe UI','Sarabun',Tahoma,sans-serif; padding: 28px; color:#222; }
        h1 { font-size: 18px; margin: 0 0 2px; }
        .doc-no { color:#888; font-size: 13px; margin-bottom: 18px; }
        .grid { display:flex; justify-content:space-between; gap:24px; font-size:13px; margin-bottom: 10px; }
        .grid > div { flex:1; }
        .grid b { display:block; margin-bottom:4px; color:#555; }
        @media print { .no-print { display:none; } }
      </style></head>
      <body>
        <div class="no-print" style="text-align:right;margin-bottom:10px;">
          <button onclick="window.print()" style="padding:8px 18px;border:none;background:#1a73e8;color:#fff;border-radius:8px;cursor:pointer;">🖨 พิมพ์เอกสาร</button>
        </div>
        <h1>${escDoc(typeLabel)}</h1>
        <div class="doc-no">เลขที่เอกสาร: ${escDoc(docNo)} &nbsp;|&nbsp; เลขออเดอร์อ้างอิง: ${escDoc(order.id)} &nbsp;|&nbsp; วันที่ออกเอกสาร: ${fmtDateDoc(new Date().toISOString())}</div>
        <div class="grid">
          <div><b>ลูกค้า / ผู้รับสินค้า</b>
            ${escDoc(c.name || '-')}<br/>
            โทร: ${escDoc(c.phone || '-')}<br/>
            ${escDoc(addr || '-')}
          </div>
          <div><b>รายละเอียดออเดอร์</b>
            ช่องทางขาย: ${escDoc(order.channel || '-')}<br/>
            พนักงานขาย: ${escDoc(order.salesperson || '-')}<br/>
            วันที่สั่งซื้อ: ${escDoc(order.orderDate || '-')}
          </div>
        </div>
        ${bodyExtra}
        <p style="margin-top:30px;font-size:12px;color:#999;">เอกสารนี้จัดทำโดยระบบ Web ERP — ${escDoc(docNo)}</p>
      </body></html>
    `;
  }

  window.__genDoc = async function (orderDocId, btnEl) {
    const order = _docOrdersCache.find(o => o._id === orderDocId);
    if (!order) return;
    const row = btnEl.closest('tr');
    const docType = row.querySelector('.doc-type-pick')?.value || 'delivery';
    btnEl.disabled = true;
    try {
      const docNo = await nextDocNo('salesDocCounter', (DOC_TYPES[docType]?.code || 'DOC') + '-');
      await addDoc(collection(db, 'salesDocuments'), {
        docNo, docType,
        orderId: order.id,
        orderDocId: order._id,
        customerName: order.customer?.name || '-',
        generatedAt: new Date().toISOString(),
        generatedAtServer: serverTimestamp(),
        generatedBy: profile.uid,
        generatedByName: profile.name || profile.email || '',
      });
      const html = buildDocHtml(docType, docNo, order);
      const w = window.open('', '_blank');
      if (w) { w.document.open(); w.document.write(html); w.document.close(); }
      else alert('เบราว์เซอร์บล็อกป๊อปอัป กรุณาอนุญาตป๊อปอัปสำหรับเว็บไซต์นี้');
      await loadDocOrdersAndLog();
    } catch (e) {
      console.error(e);
      alert('เกิดข้อผิดพลาด: ' + (e.message || e));
    } finally {
      btnEl.disabled = false;
    }
  };

  window.__reprintDoc = function (logDocId) {
    const logEntry = _docLogCache.find(d => d._id === logDocId);
    if (!logEntry) return;
    const order = _docOrdersCache.find(o => o._id === logEntry.orderDocId) ||
                  _docOrdersCache.find(o => o.id === logEntry.orderId);
    if (!order) { alert('ไม่พบข้อมูลออเดอร์ต้นทางสำหรับเอกสารนี้ (อาจถูกลบไปแล้ว)'); return; }
    const html = buildDocHtml(logEntry.docType, logEntry.docNo, order);
    const w = window.open('', '_blank');
    if (w) { w.document.open(); w.document.write(html); w.document.close(); }
  };

  // =========================================================
  // 🗺 จัดรูทขนส่ง / คัตออฟ (เฟส 2)
  // =========================================================
  let _routeOrdersCache = [];
  let _routeBatchCache = [];
  const ROUTE_OTHER = 'อื่นๆ / ไม่ระบุผู้ขนส่ง';

  function routeKeyOf(order) {
    return (order.shipping?.deliveryBy || '').trim() || ROUTE_OTHER;
  }
  function fmtTimeNow() {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  async function renderRouting() {
    main.innerHTML = `
      <div class="card"><p>${SECTIONS.routing.desc}</p></div>
      <div class="card">
        <div style="display:flex;flex-wrap:wrap;align-items:center;gap:14px;">
          <div>
            <label style="display:block;font-size:0.8rem;color:#666;margin-bottom:4px;">⏰ เวลาคัตออฟประจำวัน</label>
            <input type="time" id="cutoff-time" value="15:00" style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:0.9rem;" />
          </div>
          <div style="font-size:0.85rem;color:${'#888'};margin-top:18px;" id="cutoff-status"></div>
          <div style="flex:1;"></div>
          <button class="btn btn-outline" id="btn-route-refresh" style="margin-top:18px;">🔄 รีเฟรช</button>
        </div>
      </div>
      <div class="card">
        <h3 style="margin-top:0;">📦 ออเดอร์ที่รอจัดส่ง — จัดกลุ่มตามผู้ขนส่ง/เส้นทาง</h3>
        <div id="route-groups">⏳ กำลังโหลด...</div>
      </div>
      <div class="card">
        <h3 style="margin-top:0;">🗂 ประวัติการปิดรอบ (Cutoff Batches)</h3>
        <div id="route-batches">⏳ กำลังโหลด...</div>
      </div>
    `;
    document.getElementById('btn-route-refresh').addEventListener('click', loadRoutingData);
    document.getElementById('cutoff-time').addEventListener('change', updateCutoffStatus);
    await loadRoutingData();
    updateCutoffStatus();
  }

  function updateCutoffStatus() {
    const el = document.getElementById('cutoff-status');
    if (!el) return;
    const cutoff = document.getElementById('cutoff-time')?.value || '15:00';
    const now = fmtTimeNow();
    if (now < cutoff) {
      el.innerHTML = `🟢 ยังไม่ถึงเวลาคัตออฟ (ตอนนี้ ${now} น. — คัตออฟ ${cutoff} น.)`;
      el.style.color = '#1a8a3a';
    } else {
      el.innerHTML = `🔴 เลยเวลาคัตออฟแล้ว (ตอนนี้ ${now} น. — คัตออฟ ${cutoff} น.) ควรปิดรอบและส่งสรุปยอด`;
      el.style.color = '#d23';
    }
  }

  async function loadRoutingData() {
    const groupBox = document.getElementById('route-groups');
    const batchBox = document.getElementById('route-batches');
    if (groupBox) groupBox.innerHTML = '⏳ กำลังโหลด...';
    if (batchBox) batchBox.innerHTML = '⏳ กำลังโหลด...';
    try {
      const snap = await getDocs(query(collection(db, 'orders'), orderBy('createdAtServer', 'desc'), limit(400)));
      _routeOrdersCache = snap.docs.map(d => ({ _id: d.id, ...d.data() }))
        .filter(o => o.warehouseStage && o.warehouseStage !== 'จัดส่งแล้ว' && !o.routingBatchId);
    } catch (e) { _routeOrdersCache = []; console.warn(e); }
    try {
      const bsnap = await getDocs(query(collection(db, 'routingBatches'), orderBy('createdAtServer', 'desc'), limit(50)));
      _routeBatchCache = bsnap.docs.map(d => ({ _id: d.id, ...d.data() }));
    } catch (e) { _routeBatchCache = []; console.warn(e); }
    renderRouteGroups();
    renderRouteBatches();
  }

  function renderRouteGroups() {
    const box = document.getElementById('route-groups');
    if (!box) return;
    if (!_routeOrdersCache.length) {
      box.innerHTML = `<p style="color:#888;font-size:0.88rem;">— ไม่มีออเดอร์ที่รอจัดส่งในขณะนี้ 🎉 —</p>`;
      return;
    }
    const groups = {};
    _routeOrdersCache.forEach(o => {
      const k = routeKeyOf(o);
      groups[k] = groups[k] || [];
      groups[k].push(o);
    });
    const sortedKeys = Object.keys(groups).sort((a, b) => groups[b].length - groups[a].length);

    box.innerHTML = sortedKeys.map(routeName => {
      const list = groups[routeName];
      const total = list.reduce((s, o) => s + Number(o.subtotal || 0), 0);
      const gid = 'rg_' + routeName.replace(/[^a-zA-Z0-9ก-๙]/g, '_');
      return `
        <div style="border:1px solid #e6e9f0;border-radius:12px;padding:14px 16px;margin-bottom:14px;">
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;justify-content:space-between;">
            <div>
              <span style="font-weight:700;font-size:1rem;">🚚 ${escapeHtmlR(routeName)}</span>
              <span style="color:#888;font-size:0.82rem;margin-left:8px;">${list.length} ออเดอร์ • ยอดรวม ${fmtMoneyR(total)} บาท</span>
            </div>
            <div style="display:flex;gap:8px;">
              <label style="font-size:0.8rem;color:#555;display:flex;align-items:center;gap:5px;">
                <input type="checkbox" class="route-select-all" data-group="${gid}" /> เลือกทั้งหมด
              </label>
              <button class="btn btn-primary" style="padding:6px 14px;font-size:0.8rem;" onclick="window.__closeCutoff('${escAttr(routeName)}','${gid}')">🔒 ปิดรอบ / คัตออฟกลุ่มนี้</button>
            </div>
          </div>
          <table style="margin-top:10px;">
            <thead><tr><th style="width:30px;"></th><th>เลขออเดอร์</th><th>ลูกค้า</th><th>ที่อยู่ปลายทาง</th><th>ยอดรวม</th><th>สถานะคลัง</th></tr></thead>
            <tbody>
              ${list.map(o => `
                <tr>
                  <td><input type="checkbox" class="route-order-pick" data-group="${gid}" data-order="${o._id}" checked /></td>
                  <td>${escapeHtmlR(o.id)}</td>
                  <td>${escapeHtmlR(o.customer?.name || '-')}</td>
                  <td>${escapeHtmlR([o.customer?.district, o.customer?.province].filter(Boolean).join(', ') || '-')}</td>
                  <td>${fmtMoneyR(o.subtotal)}</td>
                  <td>${escapeHtmlR(o.warehouseStage || '-')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

    box.querySelectorAll('.route-select-all').forEach(cb => {
      cb.addEventListener('change', (ev) => {
        const gid = ev.target.dataset.group;
        box.querySelectorAll(`.route-order-pick[data-group="${gid}"]`).forEach(c => { c.checked = ev.target.checked; });
      });
    });
  }

  function renderRouteBatches() {
    const box = document.getElementById('route-batches');
    if (!box) return;
    if (!_routeBatchCache.length) {
      box.innerHTML = `<p style="color:#888;font-size:0.88rem;">— ยังไม่มีประวัติการปิดรอบ —</p>`;
      return;
    }
    box.innerHTML = `
      <table>
        <thead><tr><th>เลขที่รอบ</th><th>เส้นทาง/ผู้ขนส่ง</th><th>จำนวนออเดอร์</th><th>ยอดรวม</th><th>เวลาปิดรอบ</th><th>โดย</th></tr></thead>
        <tbody>
          ${_routeBatchCache.map(b => `
            <tr>
              <td>${escapeHtmlR(b.batchNo)}</td>
              <td>${escapeHtmlR(b.routeName)}</td>
              <td>${(b.orderIds || []).length}</td>
              <td>${fmtMoneyR(b.totalAmount)}</td>
              <td>${b.closedAt ? new Date(b.closedAt).toLocaleString('th-TH') : '-'}</td>
              <td>${escapeHtmlR(b.closedByName || '-')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>

  window.__closeCutoff = async function (routeName, gid) {
    const box = document.getElementById('route-groups');
    const checked = [...box.querySelectorAll(`.route-order-pick[data-group="${gid}"]:checked`)];
    if (!checked.length) { alert('กรุณาเลือกออเดอร์อย่างน้อย 1 รายการ'); return; }
    const orderDocIds = checked.map(c => c.dataset.order);
    const orders = orderDocIds.map(id => _routeOrdersCache.find(o => o._id === id)).filter(Boolean);
    const total = orders.reduce((s, o) => s + Number(o.subtotal || 0), 0);
    const cutoff = document.getElementById('cutoff-time')?.value || '15:00';

    if (!confirm(`ปิดรอบขนส่ง "${routeName}" จำนวน ${orders.length} ออเดอร์ ยอดรวม ${fmtMoneyR(total)} บาท ใช่หรือไม่?\n(ระบบจะบันทึกเป็นรอบขนส่งและทำเครื่องหมายในออเดอร์ว่าเข้ารอบนี้แล้ว)`)) return;

    try {
      const batchNo = await nextDocNo('routingBatchCounter', 'RT-');
      const batchRef = await addDoc(collection(db, 'routingBatches'), {
        batchNo,
        routeName,
        orderIds: orders.map(o => o.id),
        orderDocIds,
        totalAmount: total,
        cutoffTime: cutoff,
        closedAt: new Date().toISOString(),
        createdAtServer: serverTimestamp(),
        closedBy: profile.uid,
        closedByName: profile.name || profile.email || '',
      });
      // ทำเครื่องหมายในออเดอร์แต่ละรายการว่าเข้ารอบนี้แล้ว (กันถูกเลือกซ้ำในรอบถัดไป)
      for (const o of orders) {
        try { await updateDoc(doc(db, 'orders', o._id), { routingBatchId: batchRef.id, routingBatchNo: batchNo }); }
        catch (e) { console.warn('update order routing flag failed', o._id, e); }
      }
      alert(`ปิดรอบขนส่งเลขที่ ${batchNo} เรียบร้อยแล้ว — ${orders.length} ออเดอร์ ยอดรวม ${fmtMoneyR(total)} บาท\nสามารถแจ้งสรุปยอดนี้ให้ฝ่ายที่เกี่ยวข้องได้เลย`);
      await loadRoutingData();
    } catch (e) {
      console.error(e);
      alert('เกิดข้อผิดพลาด: ' + (e.message || e));
    }
  };

  function escapeHtmlR(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escAttr(s) { return String(s ?? '').replace(/'/g, "\\'"); }
  function fmtMoneyR(n) { return Number(n || 0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

  let _allOrdersCache = [];
  async function loadAllOrders() {
    const tbody = document.getElementById('orders-rows');
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#999;">กำลังโหลด...</td></tr>`;
    try {
      let snap;
      try {
        snap = await getDocs(query(collection(db, 'orders'), orderBy('createdAtServer', 'desc'), limit(300)));
      } catch (e) {
        // เผื่อเอกสารเก่าบางรายการไม่มี createdAtServer (orderBy อาจพลาด) — fallback โหลดทั้งหมด
        snap = await getDocs(collection(db, 'orders'));
      }
      _allOrdersCache = [];
      snap.forEach(d => _allOrdersCache.push({ _id: d.id, ...d.data() }));
      // เรียงสำรองด้วย id ออเดอร์ (เผื่อ fallback ไม่มี server timestamp)
      _allOrdersCache.sort((a, b) => (b.id || '').localeCompare(a.id || ''));
      renderOrderRows();
      checkDuplicateOrderIds();
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#d23;">โหลดข้อมูลไม่สำเร็จ: ${err.message}</td></tr>`;
    }

  // ตรวจหาเลขออเดอร์ที่ซ้ำกัน (ปัญหาที่เกิดจากระบบเก่าก่อนเชื่อมตัวนับกลาง) — แสดงกล่องแจ้งเตือน + ปุ่มแก้ไขอัตโนมัติ
  function checkDuplicateOrderIds() {
    const box = document.getElementById('dup-fix-box');
    const msg = document.getElementById('dup-fix-msg');
    const btn = document.getElementById('btn-fix-dup');
    const groups = {};
    _allOrdersCache.forEach(o => { if (o.id) (groups[o.id] = groups[o.id] || []).push(o); });
    const dupGroups = Object.values(groups).filter(g => g.length > 1);
    if (!dupGroups.length) { box.style.display = 'none'; return; }
    const totalExtra = dupGroups.reduce((sum, g) => sum + (g.length - 1), 0);
    box.style.display = '';
    msg.textContent = `⚠ พบเลขออเดอร์ซ้ำกัน ${dupGroups.length} ชุด (รวม ${totalExtra} รายการที่ต้องเปลี่ยนเลขใหม่) — มักเกิดจากออเดอร์ที่สร้างไว้ก่อนเชื่อมตัวนับเลขกลาง`;
    btn.onclick = () => fixDuplicateOrderIds(dupGroups);
  }

  async function fixDuplicateOrderIds(dupGroups) {
    if (!confirm('ระบบจะออกเลขออเดอร์ใหม่ให้กับรายการที่ซ้ำกัน (เก็บรายการที่สร้างก่อนไว้เลขเดิม ส่วนรายการหลังจะได้เลขใหม่) ยืนยันดำเนินการ?')) return;
    const btn = document.getElementById('btn-fix-dup');
    btn.disabled = true;
    btn.textContent = 'กำลังแก้ไข...';
    let fixed = 0;
    try {
      for (const group of dupGroups) {
        // เรียงตามเวลาสร้าง (ถ้ามี) เก็บอันแรกไว้เลขเดิม ที่เหลือออกเลขใหม่
        const sorted = [...group].sort((a, b) => {
          const ta = a.createdAtServer?.toMillis ? a.createdAtServer.toMillis() : 0;
          const tb = b.createdAtServer?.toMillis ? b.createdAtServer.toMillis() : 0;
          return ta - tb;
        });
        for (let i = 1; i < sorted.length; i++) {
          const o = sorted[i];
          const counterRef = doc(db, 'counters', 'orderCounter');
          const newId = await runTransaction(db, async (tx) => {
            const snap = await tx.get(counterRef);
            const current = snap.exists() ? (snap.data().value || 0) : 0;
            const updated = current + 1;
            tx.set(counterRef, { value: updated }, { merge: true });
            return 'ORD-' + String(updated).padStart(6, '0');
          });
          await updateDoc(doc(db, 'orders', o._id), { id: newId, idFixedFrom: o.id });
          fixed++;
        }
      }
      alert(`แก้ไขเลขออเดอร์ที่ซ้ำกันสำเร็จ ${fixed} รายการ — ระบบจะรีเฟรชรายการให้`);
      await loadAllOrders();
    } catch (err) {
      alert('แก้ไขไม่สำเร็จ: ' + err.message);
      btn.disabled = false;
      btn.textContent = '🔧 แก้เลขออเดอร์ที่ซ้ำกันให้อัตโนมัติ';
    }
  }

  function renderOrderRows() {
    const tbody = document.getElementById('orders-rows');
    const filter = document.getElementById('order-filter').value;
    const list = filter ? _allOrdersCache.filter(o => o.status === filter) : _allOrdersCache;
    if (!list.length) { tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;color:#999;">ยังไม่มีออเดอร์ในระบบ</td></tr>`; return; }

    const WH_STAGE_CLS = {
      'รอหยิบสินค้า': 'badge-pending', 'กำลังแพ็ค': 'badge-progress',
      'รอตรวจสอบ QC': 'badge-progress', 'พร้อมจัดส่ง': 'badge-progress', 'จัดส่งแล้ว': 'badge-done',
    };
    tbody.innerHTML = list.map(o => {
      const ws = o.warehouseStage || '';
      const canSendWarehouse = o.status === 'รอดำเนินการ' && !ws;
      const canCancel = o.status === 'รอดำเนินการ';
      const actionBtn = canSendWarehouse
        ? `<button class="btn btn-primary" style="font-size:0.78rem;padding:5px 10px;" onclick="window.__sendToWarehouse('${o._id}')">📦 ส่งคลัง</button>`
        : '';

        ? `<button class="btn btn-danger" style="font-size:0.78rem;padding:5px 10px;" onclick="window.__cancelOrder('${o._id}')">✕ ยกเลิก</button>`
        : '';
      return `
        <tr>
          <td><strong>${o.id || o._id}</strong></td>
          <td>${o.customer?.name || '-'}</td>
          <td>${o.channel || '-'}</td>
          <td>${o.createdByName || o.salesperson || '-'}</td>

          <td><span class="badge ${ORDER_CLS[o.status] || ''}">${o.status || '-'}</span></td>
          <td>${ws ? `<span class="badge ${WH_STAGE_CLS[ws] || 'badge-pending'}" style="font-size:0.75rem;">${ws}</span>` : '<span style="color:#aaa;font-size:0.8rem;">—</span>'}</td>
          <td style="white-space:nowrap;">${actionBtn} ${cancelBtn}</td>
        </tr>`;
    }).join('');
  }

  // ส่งออเดอร์ไปคลัง (ตั้ง warehouseStage = 'รอหยิบสินค้า')
  window.__sendToWarehouse = async function (orderDocId) {
    if (!confirm('ยืนยันส่งออเดอร์นี้ไปยังคลังสินค้าเพื่อเริ่มหยิบสินค้า?')) return;
    try {
      await updateDoc(doc(db, 'orders', orderDocId), {
        warehouseStage: 'รอหยิบสินค้า',
        updatedAt: serverTimestamp(),
      });
      // อัปเดต cache ทันที แทนที่จะโหลดใหม่ทั้งหมด
      const idx = _allOrdersCache.findIndex(o => o._id === orderDocId);
      if (idx >= 0) _allOrdersCache[idx].warehouseStage = 'รอหยิบสินค้า';
      renderOrderRows();
      // toast
      const t = document.createElement('div');
      t.textContent = '📦 ส่งออเดอร์ไปคลังเรียบร้อยแล้ว — ขึ้น Picking Queue แล้ว ✔';
      t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a73e8;color:#fff;padding:10px 22px;border-radius:10px;font-size:0.9rem;box-shadow:0 4px 16px rgba(0,0,0,.18);z-index:9999;';
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    } catch (err) { alert('ดำเนินการไม่สำเร็จ: ' + err.message); }
  };

  // ยกเลิกออเดอร์
  window.__cancelOrder = async function (orderDocId) {
    if (!confirm('ยืนยันยกเลิกออเดอร์นี้?')) return;
    try {
      await updateDoc(doc(db, 'orders', orderDocId), {
        status: 'ยกเลิก',
        updatedAt: serverTimestamp(),
      });
      const idx = _allOrdersCache.findIndex(o => o._id === orderDocId);
      if (idx >= 0) _allOrdersCache[idx].status = 'ยกเลิก';
      renderOrderRows();
    } catch (err) { alert('ดำเนินการไม่สำเร็จ: ' + err.message); }
  };

        <table>
          <thead><tr><th>ชื่อ</th><th>อีเมล</th><th>แผนก/สิทธิ์</th><th>สถานะ</th><th>การจัดการ</th></tr></thead>
          <tbody id="user-rows"><tr><td colspan="5" style="text-align:center;color:#999;">กำลังโหลด...</td></tr></tbody>
        </table>
      </div>
    `;
    document.getElementById('btn-add-user').addEventListener('click', addUser);
    await loadUsers();
  }

  async function addUser() {
    const uid = document.getElementById('u-uid').value.trim();
    const name = document.getElementById('u-name').value.trim();
    const email = document.getElementById('u-email').value.trim();
    const role = document.getElementById('u-role').value;
    const msg = document.getElementById('user-msg');
    msg.className = 'msg';
    if (!uid || !name || !email) { msg.textContent = 'กรุณากรอกข้อมูลให้ครบ (UID, ชื่อ, อีเมล)'; msg.classList.add('error'); return; }
    try {
      await setDoc(doc(db, 'users', uid), {
        name, email, role, department: roleLabel(role), active: true, createdAt: new Date().toISOString()
      });
      msg.textContent = `เพิ่มสิทธิ์ให้ ${name} (${role}) สำเร็จแล้ว`;
      msg.classList.add('ok');
      ['u-uid','u-name','u-email'].forEach(id => document.getElementById(id).value = '');
      await loadUsers();
    } catch (err) {
      msg.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
      msg.classList.add('error');
    }
  }

  async function loadUsers() {
    const tbody = document.getElementById('user-rows');
    try {
      const snap = await getDocs(collection(db, 'users'));
      if (snap.empty) { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#999;">ยังไม่มีผู้ใช้งานในระบบ</td></tr>`; return; }
      const rows = [];
      snap.forEach(d => rows.push({ uid: d.id, ...d.data() }));
      tbody.innerHTML = rows.map(u => `
        <tr>
          <td>${u.name || '-'}</td>
          <td>${u.email || '-'}</td>
          <td>${roleLabel(u.role)}</td>
          <td>${u.active ? '<span class="badge badge-done">ใช้งานได้</span>' : '<span class="badge badge-cancel">ระงับ</span>'}</td>
          <td><button class="btn btn-outline" data-uid="${u.uid}" data-active="${u.active}" onclick="toggleActive(this)">${u.active ? 'ระงับสิทธิ์' : 'เปิดใช้งาน'}</button></td>
        </tr>
      `).join('');
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#d23;">โหลดข้อมูลไม่สำเร็จ: ${err.message}</td></tr>`;
    }
  }

  function roleLabel(role) {
    return { sales:'ฝ่ายขาย', warehouse:'คลังสินค้า', accounting:'บัญชี', admin:'แอดมิน', manager:'ผู้บริหาร' }[role] || role;
  }

  // ใช้ window. เพราะ inline onclick ใน template string เรียกผ่าน global scope
  window.toggleActive = async function (btn) {
    const uid = btn.dataset.uid;
    const nextActive = btn.dataset.active !== 'true';
    try {
      await updateDoc(doc(db, 'users', uid), { active: nextActive });
      await loadUsers();
    } catch (err) { alert('อัปเดตไม่สำเร็จ: ' + err.message); }
  };

  // =========================================================
  // 📊 รายงานประจำวัน
  // =========================================================
  async function renderDailyReport() {
    const today = new Date();
    const todayStr = today.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    const todayISO = today.toISOString().slice(0, 10); // YYYY-MM-DD

    main.innerHTML = `
      <div class="card" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <div>
          <h3 style="margin:0;font-size:1rem;">📅 ${todayStr}</h3>
          <p style="margin:4px 0 0;font-size:0.82rem;color:#888;">ข้อมูล ณ เวลาที่โหลดหน้า — กด 🔄 รีเฟรชเพื่ออัปเดต</p>
        </div>
        <button class="btn btn-outline" onclick="location.reload()">🔄 รีเฟรช</button>
      </div>

      <!-- การ์ดสรุป -->
      <div class="grid-cards">
        <div class="card stat-card"><div class="num" id="dr-orders-today">-</div><div class="label">ออเดอร์ใหม่วันนี้</div></div>
        <div class="card stat-card"><div class="num" id="dr-sales-today">-</div><div class="label">ยอดขายวันนี้ (฿)</div></div>
        <div class="card stat-card"><div class="num" id="dr-pending-wh">-</div><div class="label">ออเดอร์ค้างในคลัง</div></div>
        <div class="card stat-card"><div class="num" id="dr-qc-today">-</div><div class="label">รอ QC</div></div>
        <div class="card stat-card"><div class="num" id="dr-ready-ship">-</div><div class="label">พร้อมจัดส่ง</div></div>
        <div class="card stat-card"><div class="num" id="dr-shipped-today">-</div><div class="label">จัดส่งแล้ววันนี้</div></div>
      </div>

      <!-- ออเดอร์วันนี้ -->
      <div class="card">
        <h3 style="margin-top:0;">🆕 ออเดอร์ที่สร้างวันนี้</h3>
        <div id="dr-new-orders">⏳ กำลังโหลด...</div>
      </div>

      <!-- สถานะคลัง -->
      <div class="card">
        <h3 style="margin-top:0;">🏭 สถานะคลังสินค้า (Pipeline)</h3>
        <div id="dr-pipeline">⏳ กำลังโหลด...</div>
      </div>

      <!-- ออเดอร์ค้าง (นานกว่า 1 วัน) -->
      <div class="card">
        <h3 style="margin-top:0;">⚠️ ออเดอร์ค้างในคลัง (ค้างนาน)</h3>
        <div id="dr-overdue">⏳ กำลังโหลด...</div>
      </div>
    `;

    try {
      // โหลดข้อมูลทั้งหมดพร้อมกัน
      const [ordersSnap, paymentsSnap] = await Promise.all([
        getDocs(query(collection(db, 'orders'), orderBy('createdAtServer', 'desc'), limit(500))),
        getDocs(query(collection(db, 'payments'), orderBy('dateServer', 'desc'), limit(200))),
      ]);

      const orders = [];
      ordersSnap.forEach(d => orders.push({ _id: d.id, ...d.data() }));
      const payments = [];
      paymentsSnap.forEach(d => payments.push({ _id: d.id, ...d.data() }));

      // กรองออเดอร์วันนี้
      const ordersToday = orders.filter(o => {
        const d = o.orderDate || o.createdAt || '';
        return d && d.slice(0, 10) === todayISO;
      });
      const salesToday = ordersToday.reduce((s, o) => s + Number(o.subtotal || 0), 0);

      // สถานะคลัง
      const WH_STAGES = ['รอหยิบสินค้า', 'รอตรวจสอบ QC', 'พร้อมจัดส่ง', 'จัดส่งแล้ว'];
      const stageCounts = {};
      WH_STAGES.forEach(s => stageCounts[s] = 0);
      let shippedToday = 0;
      orders.forEach(o => {
        if (o.warehouseStage && stageCounts.hasOwnProperty(o.warehouseStage)) stageCounts[o.warehouseStage]++;
        if (o.warehouseStage === 'จัดส่งแล้ว') {
          const d = o.updatedAt?.toDate?.()?.toISOString?.()?.slice(0,10) || '';
          if (d === todayISO) shippedToday++;
        }
      });
      const pendingWH = orders.filter(o => o.warehouseStage && o.warehouseStage !== 'จัดส่งแล้ว').length;

      // ใส่การ์ดสรุป
      document.getElementById('dr-orders-today').textContent = ordersToday.length;
      document.getElementById('dr-sales-today').textContent = salesToday.toLocaleString('th-TH', { minimumFractionDigits: 0 });
      document.getElementById('dr-pending-wh').textContent = pendingWH;
      document.getElementById('dr-qc-today').textContent = stageCounts['รอตรวจสอบ QC'];
      document.getElementById('dr-ready-ship').textContent = stageCounts['พร้อมจัดส่ง'];
      document.getElementById('dr-shipped-today').textContent = shippedToday;

      // ออเดอร์ใหม่วันนี้
      const newBox = document.getElementById('dr-new-orders');
      newBox.innerHTML = ordersToday.length ? `
        <table>
          <thead><tr><th>Order ID</th><th>ลูกค้า</th><th>พนักงานขาย</th><th>ยอดรวม</th><th>ช่องทาง</th><th>สถานะ</th></tr></thead>
          <tbody>
            ${ordersToday.map(o => `
              <tr>
                <td><strong>${escDoc(o.id || o._id)}</strong></td>
                <td>${escDoc(o.customer?.name || '-')}</td>
                <td>${escDoc(o.salesperson || o.createdByName || '-')}</td>
                <td>฿${Number(o.subtotal||0).toLocaleString('th-TH')}</td>
                <td>${escDoc(o.channel || '-')}</td>
                <td><span class="badge ${o.status==='เสร็จสิ้น'?'badge-done':o.status==='ยกเลิก'?'badge-cancel':'badge-pending'}">${escDoc(o.status||'-')}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>` : `<p style="color:#888;font-size:0.88rem;">— ยังไม่มีออเดอร์ใหม่วันนี้ —</p>`;

      // Pipeline bar
      const maxStage = Math.max(1, ...WH_STAGES.map(s => stageCounts[s]));
      const STAGE_ICONS = { 'รอหยิบสินค้า':'🛒', 'รอตรวจสอบ QC':'✅', 'พร้อมจัดส่ง':'📦', 'จัดส่งแล้ว':'🚚' };
      const STAGE_COLORS = { 'รอหยิบสินค้า':'#f59e0b', 'รอตรวจสอบ QC':'#6366f1', 'พร้อมจัดส่ง':'#1a73e8', 'จัดส่งแล้ว':'#1a8a3a' };
      document.getElementById('dr-pipeline').innerHTML = `
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${WH_STAGES.map(s => `
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:160px;font-size:0.85rem;color:#555;">${STAGE_ICONS[s]} ${s}</div>
              <div style="flex:1;background:#eef1f7;border-radius:8px;overflow:hidden;height:26px;">
                <div style="height:100%;width:${(stageCounts[s]/maxStage*100).toFixed(1)}%;background:${STAGE_COLORS[s]};border-radius:8px;transition:width .4s;"></div>
              </div>
              <div style="width:36px;text-align:right;font-weight:700;color:#1a2540;">${stageCounts[s]}</div>
            </div>`).join('')}
        </div>`;

      // ออเดอร์ค้าง (warehouseStage ไม่ใช่จัดส่งแล้ว และ orderDate != วันนี้)
      const overdue = orders.filter(o =>
        o.warehouseStage && o.warehouseStage !== 'จัดส่งแล้ว' &&
        o.orderDate && o.orderDate.slice(0,10) < todayISO
      ).sort((a, b) => (a.orderDate||'').localeCompare(b.orderDate||''));

      document.getElementById('dr-overdue').innerHTML = overdue.length ? `
        <table>
          <thead><tr><th>Order ID</th><th>ลูกค้า</th><th>วันที่สั่ง</th><th>ค้างกี่วัน</th><th>สถานะคลัง</th></tr></thead>
          <tbody>
            ${overdue.map(o => {
              const days = Math.floor((today - new Date(o.orderDate)) / 86400000);
              return `<tr style="${days >= 3 ? 'background:#fff5f5;' : ''}">
                <td><strong>${escDoc(o.id || o._id)}</strong></td>
                <td>${escDoc(o.customer?.name || '-')}</td>
                <td>${escDoc(o.orderDate||'-')}</td>
                <td style="font-weight:700;color:${days>=3?'#d23':days>=1?'#b8740a':'#1a8a3a'};">${days} วัน</td>
                <td><span class="badge badge-progress" style="font-size:0.75rem;">${escDoc(o.warehouseStage||'-')}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>` : `<p style="color:#1a8a3a;font-size:0.88rem;">✅ ไม่มีออเดอร์ค้างข้ามวัน ทุกรายการอยู่ในสถานะปกติ</p>`;

    } catch (err) {
      main.innerHTML += `<div class="card" style="border-left:4px solid #d23;color:#d23;">โหลดข้อมูลไม่สำเร็จ: ${err.message}</div>`;
    }
  }
</script>
</html>
