      assigned:  { bg:'#ede9fe', color:'#5b21b6', label:'มอบหมายแล้ว' },
      picking:   { bg:'#dbeafe', color:'#1e40af', label:'กำลังหยิบ' },
      completed: { bg:'#d1fae5', color:'#065f46', label:'เสร็จแล้ว' },
      cancelled: { bg:'#f3f4f6', color:'#6b7280', label:'ยกเลิก' },
    };
    const c = map[s] || { bg:'#f0f0f0', color:'#555', label: s||'–' };
    return `<span style="background:${c.bg};color:${c.color};padding:3px 10px;border-radius:12px;font-size:0.78rem;font-weight:600;">${c.label}</span>`;
  }

  async function renderPickingGroups() {
    main.innerHTML = `<div class="card"><p style="color:#999;text-align:center;padding:20px;">กำลังโหลด...</p></div>`;
    try {
      // load groups and ungrouped orders in parallel
      const [pgSnap, orderSnap] = await Promise.all([
        getDocs(query(collection(db,'pickingGroups'), limit(200))),
        getDocs(query(collection(db,'orders'), where('warehouseStage','==','รอหยิบสินค้า'))),
      ]);

      let groups = [];
      pgSnap.forEach(d => groups.push({_id:d.id,...d.data()}));
      groups.sort((a,b) => (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

      let ungrouped = [];
      orderSnap.forEach(d => { const data = d.data(); if (!data.pickingGroupId) ungrouped.push({_id:d.id,...data}); });

      const total     = groups.length;
      const pending   = groups.filter(g => g.status==='pending').length;
      const assigned  = groups.filter(g => g.status==='assigned').length;
      const picking   = groups.filter(g => g.status==='picking').length;
      const completed = groups.filter(g => g.status==='completed').length;

      main.innerHTML = `
        <!-- KPI -->
        <div class="grid-cards" style="grid-template-columns:repeat(auto-fit,minmax(120px,1fr));margin-bottom:14px;">
          ${[
            ['🗂','ทั้งหมด',total,'#1a73e8'],
            ['⏳','รอดำเนินการ',pending,'#d97706'],
            ['👤','มอบหมายแล้ว',assigned,'#7c3aed'],
            ['🔄','กำลังหยิบ',picking,'#0891b2'],
            ['✅','เสร็จแล้ว',completed,'#065f46'],
            ['🆕','ยังไม่จัดกลุ่ม',ungrouped.length,'#b91c1c'],
          ].map(([icon,label,val,color])=>`
            <div class="card" style="text-align:center;padding:14px 8px;">
              <div style="font-size:1.4rem;">${icon}</div>
              <div style="font-size:1.7rem;font-weight:700;color:${color};">${val}</div>
              <div style="font-size:0.76rem;color:#888;">${label}</div>
            </div>`).join('')}
        </div>

        <!-- Action bar -->
        <div class="card" style="margin-bottom:14px;">
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <button class="btn btn-primary" id="btn-autogroup" onclick="window.__autoGroup()">
              🤖 Auto-Group (${ungrouped.length} ออเดอร์รอ)
            </button>
            <button class="btn btn-outline" onclick="renderPickingGroups()">🔄 รีเฟรช</button>
            <select id="pg-filter-status" onchange="window.__pgFilter()"
              style="padding:8px 12px;border:1.5px solid #c5c8d6;border-radius:8px;font-size:0.88rem;font-family:inherit;">
              <option value="">— ทุกสถานะ —</option>
              <option value="pending">รอดำเนินการ</option>
              <option value="assigned">มอบหมายแล้ว</option>
              <option value="picking">กำลังหยิบ</option>
              <option value="completed">เสร็จแล้ว</option>
              <option value="cancelled">ยกเลิก</option>
            </select>
          </div>
        </div>

        <!-- Groups Table -->
        <div class="card">
          <div style="overflow-x:auto;">
            <table>
              <thead><tr>
                <th>PG ID</th>
                <th>กลยุทธ์</th>
                <th style="text-align:center;">ออเดอร์</th>
                <th>ขนส่ง</th>
                <th>ผู้หยิบ</th>
                <th>สถานะ</th>
                <th style="font-size:0.8rem;color:#888;">วันที่</th>
                <th></th>
              </tr></thead>
              <tbody id="pg-rows">${renderPgRows(groups)}</tbody>
            </table>
          </div>
        </div>
      `;

      window._pgAll = groups;
      window.__pgFilter = function() {
        const st = document.getElementById('pg-filter-status')?.value||'';
        document.getElementById('pg-rows').innerHTML = renderPgRows(st ? window._pgAll.filter(g=>g.status===st) : window._pgAll);
      };

    } catch(err) {
      main.innerHTML = `<div class="card" style="color:#d23;">โหลดไม่สำเร็จ: ${err.message}</div>`;
    }
  }

  function renderPgRows(groups) {
    if (!groups.length) return `<tr><td colspan="8" style="text-align:center;color:#999;padding:24px;">ยังไม่มีกลุ่มงาน</td></tr>`;
    return groups.map(g => {
      const d = g.createdAt?.seconds ? new Date(g.createdAt.seconds*1000).toLocaleDateString('th-TH',{day:'2-digit',month:'short'}) : '–';
      return `<tr>
        <td class="mono" style="font-weight:700;font-size:0.84rem;">${escV(g.pgId||g._id)}</td>
        <td style="font-size:0.82rem;">${escV(g.strategyName||'Manual')}</td>
        <td style="text-align:center;font-weight:600;">${g.orderCount||0}</td>
        <td style="font-size:0.82rem;">${escV(g.carrier||'–')}</td>
        <td style="font-size:0.82rem;">${escV(g.assignedToName||'–')}</td>
        <td>${pgStatusBadge(g.status)}</td>
        <td style="font-size:0.8rem;color:#888;">${d}</td>
        <td style="white-space:nowrap;text-align:right;">
          ${g.status==='pending'   ? `<button class="btn btn-outline" style="font-size:0.78rem;padding:4px 8px;" onclick="window.__openAssignPicker('${g._id}')">👤 มอบหมาย</button>` : ''}
          ${g.status==='assigned'  ? `<button class="btn btn-primary" style="font-size:0.78rem;padding:4px 8px;" onclick="window.__startPG('${g._id}')">▶ เริ่มหยิบ</button>` : ''}
          ${g.status==='picking'   ? `<button class="btn btn-success" style="font-size:0.78rem;padding:4px 8px;" onclick="window.__completePG('${g._id}')">✔ เสร็จแล้ว</button>` : ''}
          <button class="btn btn-outline" style="font-size:0.78rem;padding:4px 8px;margin-left:3px;" onclick="window.__printPickingList('${g._id}')">🖨 ใบหยิบ</button>
          <button class="btn btn-outline" style="font-size:0.78rem;padding:4px 8px;margin-left:3px;" onclick="window.__printLabels('${g._id}')">🏷 ใบปะหน้า</button>
        </td>
      </tr>`;
    }).join('');
  }

  // --- Auto-Grouping Engine ---
  window.__autoGroup = async function() {
    const btn = document.getElementById('btn-autogroup');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ กำลังจัดกลุ่ม...'; }
    try {
      // 1. Load active strategies
      let strategies = [];
      try {
        const snap = await getDocs(query(collection(db,'pickingStrategies'), where('active','==',true)));
        snap.forEach(d => strategies.push({_id:d.id,...d.data()}));
      } catch(e) {
        const snap = await getDocs(collection(db,'pickingStrategies'));
        snap.forEach(d => { const data = d.data(); if (data.active && !data.deleted) strategies.push({_id:d.id,...data}); });
      }
      strategies = strategies.filter(s => !s.deleted).sort((a,b) => (a.priority||99)-(b.priority||99));
      if (!strategies.length) { toast('⚠ ไม่มีกลยุทธ์ที่เปิดใช้งาน — กรุณาสร้างกลยุทธ์ก่อน'); if(btn){btn.disabled=false;btn.textContent='🤖 Auto-Group';} return; }

      // 2. Load ungrouped orders
      const orderSnap = await getDocs(query(collection(db,'orders'), where('warehouseStage','==','รอหยิบสินค้า')));
      const orders = [];
      orderSnap.forEach(d => { const data = d.data(); if (!data.pickingGroupId) orders.push({_id:d.id,...data}); });
      if (!orders.length) { toast('ไม่มีออเดอร์ที่รอจัดกลุ่ม'); if(btn){btn.disabled=false;btn.textContent='🤖 Auto-Group';} return; }

      // 3. Match orders to strategies
      const assigned = new Set();
      const groupMap = {};
      for (const strategy of strategies) {
        for (const order of orders) {
          if (assigned.has(order._id)) continue;
          if (matchesStrategy(order, strategy.conditions)) {
            if (!groupMap[strategy._id]) groupMap[strategy._id] = [];
            groupMap[strategy._id].push(order);
            assigned.add(order._id);
          }
        }
      }

      // 4. Create PG documents
      let created = 0;
      for (const [stratId, groupOrders] of Object.entries(groupMap)) {
        const strategy = strategies.find(s => s._id === stratId);
        const maxOrders = strategy?.maxOrders || 50;
        for (let i = 0; i < groupOrders.length; i += maxOrders) {
          const chunk = groupOrders.slice(i, i + maxOrders);
          const pgId = await getNextPgId();
          const pgRef = await addDoc(collection(db,'pickingGroups'), {
            pgId, strategyId: stratId,
            strategyName: strategy?.name||'–',
            orderIds: chunk.map(o=>o._id),
            orderDisplayIds: chunk.map(o=>o.id||o._id),
            orderCount: chunk.length,
            carrier: chunk[0]?.shipping?.carrier||'–',
            status: 'pending',
            createdAt: serverTimestamp(),
            createdBy: profile.uid,
            createdByName: profile.name||profile.email||'–',
          });
          for (const order of chunk) {
            try { await updateDoc(doc(db,'orders',order._id), { pickingGroupId: pgRef.id, pickingGroupPgId: pgId, updatedAt: serverTimestamp() }); } catch(e) {}
          }
          created++;
        }
      }
      toast(`✅ สร้าง ${created} กลุ่มงานหยิบ จาก ${assigned.size} ออเดอร์`);
      renderPickingGroups();
    } catch(err) {
      alert('Auto-group ไม่สำเร็จ: '+err.message);
      if (btn) { btn.disabled=false; btn.textContent='🤖 Auto-Group'; }
    }
  };

  // --- Picker Assignment ---
  window.__openAssignPicker = async function(pgDocId) {
    let users = [];
    try {
      const snap = await getDocs(query(collection(db,'users'), where('role','==','warehouse')));
      snap.forEach(d => users.push({_id:d.id,...d.data()}));
    } catch(e) {}

    const overlay = document.createElement('div');
    overlay.id = 'assign-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px;';
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:14px;padding:24px;max-width:400px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.22);">
        <h3 style="margin:0 0 16px;font-size:1rem;">👤 มอบหมายงานหยิบสินค้า</h3>
        <div class="field">
          <label>เลือกผู้หยิบสินค้า</label>
          <select id="picker-sel" style="width:100%;padding:9px 12px;border:1.5px solid #dde;border-radius:8px;font-size:0.9rem;font-family:inherit;">
            <option value="">— เลือก —</option>
            ${users.map(u=>`<option value="${u._id}" data-name="${escV(u.name||u.email)}">${escV(u.name||u.email)}</option>`).join('')}
          </select>
        </div>
        ${!users.length?'<p style="font-size:0.82rem;color:#f59e0b;margin-top:6px;">⚠ ไม่พบพนักงานคลัง — สามารถพิมพ์ชื่อด้านล่าง</p>':''}
        <div class="field" style="margin-top:10px;">
          <label>หรือพิมพ์ชื่อผู้หยิบ</label>
          <input id="picker-name-inp" placeholder="ชื่อผู้หยิบสินค้า" style="width:100%;padding:9px 12px;border:1.5px solid #dde;border-radius:8px;font-size:0.9rem;font-family:inherit;" />
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px;">
          <button onclick="document.getElementById('assign-overlay').remove()" class="btn btn-outline">ยกเลิก</button>
          <button onclick="window.__confirmAssign('${pgDocId}')" class="btn btn-primary">✔ มอบหมาย</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
  };

  window.__confirmAssign = async function(pgDocId) {
    const sel = document.getElementById('picker-sel');
    const uid = sel?.value;
    const nameFromSel = sel?.options[sel.selectedIndex]?.dataset.name;
    const nameFromInp = document.getElementById('picker-name-inp')?.value.trim();
    const name = nameFromInp || nameFromSel || '';
    if (!name) { alert('กรุณาเลือกหรือพิมพ์ชื่อผู้หยิบ'); return; }
    try {
      await updateDoc(doc(db,'pickingGroups',pgDocId), {
        status:'assigned', assignedTo: uid||null, assignedToName: name,
        assignedAt: serverTimestamp(), updatedAt: serverTimestamp(),
      });
      document.getElementById('assign-overlay')?.remove();
      toast('มอบหมายงานแล้ว ✔');
      renderPickingGroups();
    } catch(e) { alert('ไม่สำเร็จ: '+e.message); }
  };

  window.__startPG = async function(pgDocId) {
    try {
      await updateDoc(doc(db,'pickingGroups',pgDocId), { status:'picking', startedAt: serverTimestamp(), updatedAt: serverTimestamp() });
      toast('เริ่มหยิบสินค้าแล้ว');
      renderPickingGroups();
    } catch(e) { alert('ไม่สำเร็จ: '+e.message); }
  };

  window.__completePG = async function(pgDocId) {
    if (!confirm('ยืนยันว่าหยิบสินค้าครบแล้ว?\nออเดอร์ทั้งหมดจะเข้าสู่ขั้นตอน QC ตรวจสอบ')) return;
    try {
      const snap = await getDoc(doc(db,'pickingGroups',pgDocId));
      const pg = snap.data();
      await updateDoc(doc(db,'pickingGroups',pgDocId), { status:'completed', completedAt: serverTimestamp(), updatedAt: serverTimestamp() });
      for (const oid of (pg.orderIds||[])) {
        try { await updateDoc(doc(db,'orders',oid), { warehouseStage:'รอตรวจสอบ QC', updatedAt: serverTimestamp() }); } catch(e) {}
      }
      toast('✅ เสร็จสิ้น — ออเดอร์เข้า QC แล้ว');
      renderPickingGroups();
    } catch(e) { alert('ไม่สำเร็จ: '+e.message); }
  };

  // --- Print Picking List ---
  window.__printPickingList = async function(pgDocId) {
    try {
      const pgSnap = await getDoc(doc(db,'pickingGroups',pgDocId));
      if (!pgSnap.exists()) { alert('ไม่พบข้อมูลกลุ่ม'); return; }
      const pg = pgSnap.data();
      const orders = [];
      for (const oid of (pg.orderIds||[])) {
        try { const s = await getDoc(doc(db,'orders',oid)); if(s.exists()) orders.push({_id:s.id,...s.data()}); } catch(e) {}
      }
      const totalItems = orders.reduce((s,o)=>s+(o.items||[]).reduce((ss,it)=>ss+(Number(it.qty)||0),0),0);
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
        <title>ใบหยิบสินค้า ${escV(pg.pgId)}</title>
        <style>
          body{font-family:'TH Sarabun New',Sarabun,sans-serif;font-size:11pt;margin:10mm;}
          h2{margin:0;font-size:15pt;} .sub{font-size:9.5pt;color:#555;margin:2px 0;}
          table{width:100%;border-collapse:collapse;margin-top:12px;}
          th{background:#f0f0f0;border:1px solid #bbb;padding:5px 8px;text-align:left;font-size:10pt;}
          td{border:1px solid #ddd;padding:5px 8px;font-size:10pt;vertical-align:top;}
          .mono{font-family:monospace;} .footer{margin-top:16px;border-top:1px solid #ccc;padding-top:8px;font-size:9pt;color:#888;}
          @media print{body{margin:8mm;}}
        </style></head><body>
        <div style="border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:4px;">
          <h2>📋 ใบหยิบสินค้า (Picking List)</h2>
          <p class="sub">PG: <b>${escV(pg.pgId)}</b> | กลยุทธ์: ${escV(pg.strategyName||'–')} | ขนส่ง: ${escV(pg.carrier||'–')}</p>
          <p class="sub">วันที่พิมพ์: ${new Date().toLocaleString('th-TH')} | ผู้หยิบ: ${escV(pg.assignedToName||'ยังไม่มอบหมาย')}</p>
        </div>
        <table>
          <thead><tr><th style="width:22%">Order ID</th><th style="width:20%">ลูกค้า</th><th>รายการสินค้า</th><th style="width:16%">ขนส่ง</th></tr></thead>
          <tbody>
            ${orders.map((o,idx)=>`<tr style="${idx%2?'background:#fafafa':''}">
              <td class="mono"><b>${escV(o.id||o._id)}</b></td>
              <td>${escV(o.customer?.name||'–')}<br><span style="font-size:9pt;color:#888;">${escV(o.customer?.phone||'')}</span></td>
              <td>${(o.items||[]).map(it=>`<div style="margin-bottom:3px;"><b>${escV(it.model||it.sku||'–')}</b> × <b>${it.qty}</b>${it.sku?` <span style="font-family:monospace;font-size:9pt;color:#888;">[${escV(it.sku)}]</span>`:''}</div>`).join('')}</td>
              <td style="font-size:9.5pt;">${escV(o.shipping?.carrier||'–')}</td>
            </tr>`).join('')}
          </tbody>
        </table>
        <div class="footer">รวม <b>${orders.length}</b> ออเดอร์ | <b>${totalItems}</b> ชิ้น | ลายเซ็นผู้หยิบ: ________________________</div>
        <script>window.onload=()=>{window.print();window.onafterprint=()=>window.close();}<\/script>
      </body></html>`;
      const win = window.open('','_blank');
      if (win) { win.document.write(html); win.document.close(); }
    } catch(e) { alert('พิมพ์ไม่สำเร็จ: '+e.message); }
  };

  // --- Print Shipping Labels ---
  window.__printLabels = async function(pgDocId) {

      const pgSnap = await getDoc(doc(db,'pickingGroups',pgDocId));
      if (!pgSnap.exists()) { alert('ไม่พบข้อมูลกลุ่ม'); return; }
      const pg = pgSnap.data();
      const orders = [];
      for (const oid of (pg.orderIds||[])) {
        try { const s = await getDoc(doc(db,'orders',oid)); if(s.exists()) orders.push({_id:s.id,...s.data()}); } catch(e) {}
      }
      const labelBlocks = orders.map(o => {
        const addr = [o.customer?.addressDetail, o.customer?.district, o.customer?.province, o.customer?.zipcode].filter(Boolean).join(' ');
        const trackings = o.trackings||[];
        const trackingStr = trackings.map(t=>t.trackingNo).filter(Boolean).join(', ') || o.shipping?.trackingInfo || '';

          <div class="lcarrier">${escV(o.shipping?.carrier||'–')}</div>

          <div class="laddr">${escV(addr)}</div>
          <div class="lphone">📞 ${escV(o.customer?.phone||'–')}</div>
          <div class="lorder">Order: ${escV(o.id||o._id)} | ${(o.items||[]).map(it=>`${escV(it.model||it.sku||'?')} ×${it.qty}`).join(', ')}</div>
        </div>`;
      }).join('');
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
        <title>ใบปะหน้า ${escV(pg.pgId)}</title>
        <style>
          body{font-family:'TH Sarabun New',Sarabun,sans-serif;margin:5mm;}
          .label{border:2px solid #000;border-radius:4px;padding:10px 12px;margin:4mm;width:85mm;display:inline-block;vertical-align:top;page-break-inside:avoid;}
          .lcarrier{font-size:12pt;font-weight:bold;color:#1a73e8;border-bottom:1px solid #ddd;padding-bottom:4px;margin-bottom:4px;}

          @media print{body{margin:4mm;}}
        </style></head><body>
        <div class="header">ใบปะหน้า | ${escV(pg.pgId)} | ${orders.length} ออเดอร์ | พิมพ์: ${new Date().toLocaleString('th-TH')}</div>
        ${labelBlocks}
        <script>window.onload=()=>{window.print();window.onafterprint=()=>window.close();}<\/script>
      </body></html>`;
      const win = window.open('','_blank');
      if (win) { win.document.write(html); win.document.close(); }
    } catch(e) { alert('พิมพ์ไม่สำเร็จ: '+e.message); }
  };

</script>
